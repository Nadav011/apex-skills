# ==============================================================================
# RTL-VALIDATOR SKILL v24.5.0
# APEX Law #5 Enforcement - RTL-FIRST Compliance System
# ==============================================================================
name: rtl-validator
version: "24.5.0"
classification: APEX_LAW_ENFORCEMENT
authority: LAW_5_GUARDIAN

master_coordinate:
  source: "~/.claude/CLAUDE.md"
  version: "24.5.0"
  law_enforced: 5
  law_name: "RTL-FIRST"
  law_icon: "COMPASS"

inherits:
  - ~/.claude/CLAUDE.md
  - ~/.claude/rules/quality/rtl-i18n.md

description: |
  APEX RTL Validator - Zero-tolerance enforcement of Law #5 RTL-FIRST.
  Scans, detects, and auto-fixes physical directional properties in code.
  Ensures Hebrew/Arabic RTL compliance across all frontend code.

author: "APEX System"
category: "law-enforcement"

# ==============================================================================
# TRIGGERS (10+)
# ==============================================================================
triggers:
  # Primary commands
  - "/rtl"
  - "/rtl-check"
  - "/rtl-scan"
  - "/rtl-fix"
  - "/rtl-audit"
  # Aliases
  - "/mirror"
  - "/bidi"
  - "/ltr-check"
  - "/logical-css"
  # Contextual
  - "/validate-rtl"
  - "/check-rtl"
  - "/fix-rtl"

# ==============================================================================
# COMMANDS
# ==============================================================================
commands:
  scan:
    description: "Scan code for RTL violations"
    usage: "/rtl scan [path]"
    options:
      - "--verbose, -v: Show detailed output"
      - "--json: JSON output for CI"
    example: "/rtl scan ./src/components"

  fix:
    description: "Auto-fix RTL violations in place"
    usage: "/rtl fix [path]"
    options:
      - "--dry-run: Preview fixes without applying"
      - "--interactive: Confirm each fix"
    example: "/rtl fix ./src --dry-run"

  audit:
    description: "Full RTL compliance audit with report"
    usage: "/rtl audit [path]"
    options:
      - "--ci: Exit 1 on violations (for CI/CD)"
      - "--report: Generate markdown report"
    example: "/rtl audit ./src --ci"

  check:
    description: "Quick RTL check (errors only)"
    usage: "/rtl check [path]"
    example: "/rtl check ./src/Button.tsx"

  report:
    description: "Generate RTL compliance report"
    usage: "/rtl report [path]"
    options:
      - "--format: md|json|html"
    example: "/rtl report ./src --format=md"

  rules:
    description: "Display RTL mapping rules"
    usage: "/rtl rules"
    example: "/rtl rules"

  icons:
    description: "Show icon flipping guidelines"
    usage: "/rtl icons"
    example: "/rtl icons"

# ==============================================================================
# PRIME DIRECTIVES
# ==============================================================================
prime_directives:
  - id: PD1
    name: "Zero Physical Properties"
    rule: "NEVER allow ml-/mr-/pl-/pr-/left-/right- in code"
    severity: BLOCKING
    enforcement: AUTOMATIC

  - id: PD2
    name: "Logical Properties Only"
    rule: "ALWAYS use ms-/me-/ps-/pe-/inset-s-/inset-e- equivalents (start-/end- deprecated in TW 4.2)"
    severity: BLOCKING
    enforcement: AUTOMATIC

  - id: PD3
    name: "Icon Direction Awareness"
    rule: "HORIZONTAL directional icons (ChevronLeft/Right, ArrowLeft/Right) MUST have rtl:rotate-180. VERTICAL icons (ChevronUp/Down, ArrowUp/Down) must NOT have rtl:rotate-180 — they are RTL-neutral."
    severity: WARNING
    enforcement: REVIEW

  - id: PD4
    name: "LTR Content Isolation"
    rule: "Numbers, URLs, code MUST be wrapped in dir='ltr'"
    severity: WARNING
    enforcement: REVIEW

  - id: PD5
    name: "BiDi Content Handling"
    rule: "English terms in Hebrew MUST use <bdi> isolation"
    severity: INFO
    enforcement: SUGGEST

  - id: PD6
    name: "CSS Logical Properties"
    rule: "CSS-in-JS MUST use margin-inline-start not margin-left"
    severity: WARNING
    enforcement: AUTOMATIC

  - id: PD7
    name: "Form Input Direction"
    rule: "Email/URL/Tel inputs MUST have dir='ltr'"
    severity: WARNING
    enforcement: REVIEW

  - id: PD8
    name: "Gap Over Space"
    rule: "Prefer gap-* over space-x-* for RTL safety"
    severity: INFO
    enforcement: SUGGEST

# ==============================================================================
# VIOLATION DEFINITIONS
# ==============================================================================
violations:
  error:
    - pattern: "\\bm[lr]-\\d+"
      message: "Physical margin class"
      fix: "ml- -> ms-, mr- -> me-"
    - pattern: "\\bp[lr]-\\d+"
      message: "Physical padding class"
      fix: "pl- -> ps-, pr- -> pe-"
    - pattern: "\\b(left|right)-[0-9a-z]+"
      message: "Physical position class"
      fix: "left- -> inset-s-, right- -> inset-e- (generates inset-inline-start/inset-inline-end). start-/end- deprecated in TW 4.2."
    - pattern: "\\btext-(left|right)\\b"
      message: "Physical text alignment"
      fix: "text-left -> text-start, text-right -> text-end"
    - pattern: "\\bborder-[lr](-|\\b)"
      message: "Physical border class"
      fix: "border-l -> border-s, border-r -> border-e"
    - pattern: "\\brounded-[lr](-|\\b)"
      message: "Physical border radius"
      fix: "rounded-l -> rounded-s, rounded-r -> rounded-e"
    - pattern: "\\brounded-[tb][lr]"
      message: "Physical corner radius"
      fix: "rounded-tl -> rounded-ss, rounded-tr -> rounded-se, etc."

  warning:
    - pattern: "marginLeft|marginRight"
      message: "CSS-in-JS physical margin"
      fix: "Use marginInlineStart/End"
    - pattern: "paddingLeft|paddingRight"
      message: "CSS-in-JS physical padding"
      fix: "Use paddingInlineStart/End"
    - pattern: "left:\\s|right:\\s"
      message: "CSS physical position"
      fix: "Use inset-inline-start/end"
    - pattern: "(Arrow|Chevron|Caret)(Left|Right)"
      message: "Horizontal directional icon may need rtl:rotate-180 — verify it points left/right (NOT up/down). ChevronUp/Down and ArrowUp/Down are vertical and must NOT be flagged."
      fix: "Add rtl:rotate-180 class to horizontal icons only"

  info:
    - pattern: "\\bspace-x-"
      message: "Consider using gap-* for better RTL support"
      fix: "Replace with gap-*"

# ==============================================================================
# FIX MAPPINGS (Automated)
# ==============================================================================
fix_mappings:
  tailwind:
    ml-: ms-
    mr-: me-
    pl-: ps-
    pr-: pe-
    left-: inset-s-
    right-: inset-e-
    start-: inset-s-  # start-* deprecated in TW 4.2
    end-: inset-e-    # end-* deprecated in TW 4.2
    text-left: text-start
    text-right: text-end
    border-l: border-s
    border-r: border-e
    rounded-l: rounded-s
    rounded-r: rounded-e
    rounded-tl: rounded-ss
    rounded-tr: rounded-se
    rounded-bl: rounded-es
    rounded-br: rounded-ee
    "-ml-": "-ms-"
    "-mr-": "-me-"

  css:
    margin-left: margin-inline-start
    margin-right: margin-inline-end
    padding-left: padding-inline-start
    padding-right: padding-inline-end
    left: inset-inline-start
    right: inset-inline-end
    border-left: border-inline-start
    border-right: border-inline-end
    "text-align: left": "text-align: start"
    "text-align: right": "text-align: end"
    "float: left": "float: inline-start"
    "float: right": "float: inline-end"

# ==============================================================================
# VERIFICATION GATES
# ==============================================================================
verification_gates:
  - gate: G17
    name: "RTL_STRICT"
    threshold: 0
    description: "Zero physical directional properties"
    blocking: true

  - gate: G50
    name: "SPACING_SCALE"
    threshold: "8pt"
    description: "8pt grid compliance"
    blocking: false

# ==============================================================================
# INTEGRATION
# ==============================================================================
integration:
  ci_cd:
    script: "~/.claude/skills/rtl-validator/rtl-audit.sh"
    flags: "--ci --json"
    fail_on: "errors"

  pre_commit:
    hook: ".husky/pre-commit"
    command: "~/.claude/skills/rtl-validator/rtl-audit.sh ./src"

  biome:
    rule: "Biome 2.4.4 handles RTL linting natively via biome-ignore overrides"
    config: "See references/rtl-validation-rules.md"

# ==============================================================================
# CAPABILITIES
# ==============================================================================
capabilities:
  - rtl_scanning
  - pattern_detection
  - ast_analysis
  - auto_fix
  - compliance_reporting
  - ci_cd_integration
  - pre_commit_hooks
  - json_output
  - flutter_support
  - css_in_js_support

# ==============================================================================
# TAGS
# ==============================================================================
tags:
  - rtl
  - rtl-first
  - validation
  - hebrew
  - arabic
  - i18n
  - bidi
  - logical-properties
  - tailwind
  - css
  - law-5
  - apex

# ==============================================================================
# DEPENDENCIES
# ==============================================================================
dependencies:
  required:
    - node >= 24.14.0
  optional:
    - ast-grep
    - biome

# ==============================================================================
# REFERENCES
# ==============================================================================
references:
  - path: "references/rtl-css-patterns.md"
    description: "CSS logical properties reference"
  - path: "references/rtl-tailwind-mapping.md"
    description: "Complete Tailwind class mappings"
  - path: "references/rtl-validation-rules.md"
    description: "Detailed validation rules and CI/CD"
  - path: "references/rtl-fix-examples.md"
    description: "Before/after fix examples"
  - path: "templates/layout.tsx"
    description: "RTL-ready Next.js layout template"
  - path: "templates/main.dart"
    description: "RTL-ready Flutter main template"
  - path: "templates/globals.css"
    description: "RTL-ready global CSS template"

# ==============================================================================
# SEAL
# ==============================================================================
verification_seal:
  version: "24.5.0"
  master_coordinate: "24.5.0"
  law_enforced: "LAW_5_RTL_FIRST"
  gates_checked: [G17, G50]
  prime_directives: 8
  triggers: 12
  commands: 7
  status: ACTIVE
