  - brotli       # Setup Brotli compression (25-30% smaller)
  - streaming    # Configure streaming responses (200-500ms faster)
  - partytown    # Setup analytics offload (50% INP improvement)
  # ANDROID RENDERING commands (v24.5.0)
  - android-rendering-audit    # Full Android rendering issues audit
  - fix-content-visibility     # Disable content-visibility for Android
  - fix-stroke-width           # Standardize SVG strokeWidth
  - fix-touch-targets          # Add 44px touch target wrappers
  - fix-view-transitions       # Disable View Transitions for old Android
  - fix-scroll-margin          # Fix TanStack Virtual scrollMargin race

# Model selection per task type
model_guidance:
  architecture: opus    # Complex PWA decisions
  implementation: sonnet # SW code generation
  validation: sonnet    # Quick manifest/icon checks

# 9 Dimensions coverage
dimensions:
  D1_Security: 85%      # CSP, COOP/COEP, SW scope
  D2_Performance: 100%  # 35 NVIDIA optimizations
  D3_Accessibility: 60% # Reduced motion, screen reader
  D4_SEO: N/A           # Out of scope for PWA
  D5_RTL: 100%          # Full logical properties
  D6_Responsive: 100%   # 44px touch, device parity
  D7_Offline: 100%      # Core skill domain
  D8_Testing: 95%       # Playwright, Lighthouse CI
  D9_Documentation: 100% # 19 reference files

